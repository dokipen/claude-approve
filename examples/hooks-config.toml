# Claude Code Approval Hook Configuration
# Place at ~/.claude/hooks-config.toml
#
# IMPORTANT: file_path_regex uses unanchored substring matching (Go's regexp.MatchString).
# A pattern like "safe_dir" matches ANY path containing "safe_dir", including traversal
# paths like "/safe_dir/../../etc/shadow". Use anchors to avoid unintended matches:
#   ^/project/            anchors to path start  (scope allow rules to a directory)
#   \.go$                 anchors to path end    (match by file extension)
#   ^/project/.*\.go$    fully-anchored          (most restrictive; preferred for allow rules)
# For deny rules, unanchored patterns are usually intentional (block the extension anywhere),
# but double-check that the pattern cannot be evaded by path manipulation.

[audit]
audit_file = "~/.claude/claude-tool-audit.jsonl"
audit_level = "matched"  # off | matched | all

# ──────────────────────────────────────────────
# Deny rules (evaluated first, highest priority)
# ──────────────────────────────────────────────

[[deny]]
tool = "Bash"
command_regex = "^rm\\b.*(-rf|-fr)"
reason = "Blocked rm -rf"

[[deny]]
tool = "Bash"
command_regex = "^(sudo|chmod|chown) "
reason = "Blocked sudo/chmod/chown"

[[deny]]
tool = "Write"
file_path_regex = "\\.(env|pem|key|secret)$"  # anchored at end ($); blocks these extensions anywhere in the path tree
reason = "Blocked writing secrets (.env/.pem/.key)"

# ──────────────────────────────────────────────
# Allow rules (auto-approve matching tool calls)
#
# Compound commands (&&, ||, ;, |) and bash -c are
# split by the shell AST parser. Each sub-command is
# evaluated independently. Most restrictive wins:
#   deny > ask > passthrough > allow
# ──────────────────────────────────────────────

[[allow]]
tool = "Bash"
command_regex = "^(bash|cargo|cat|cp|curl|diff|du|echo|env|file|find|grep|head|kill|killall|ls|lsof|make|mkdir|mv|nc|npm|npx|open|pgrep|pkill|pwd|pytest|sort|tail|tee|test|touch|tree|unzip|wc|which|yq)( |$)"
reason = "Simple command"

[[allow]]
tool = "Bash"
command_regex = "^(dart|flutter|gh|git|go|grpcurl|python3|ruby|sbt) [-a-z]"
reason = "Dev tool"

[[allow]]
tool = "Bash"
command_regex = "^issues (ticket|label|assign|unassign|block|comment|auth|help)( |$)"
reason = "issues CLI safe subcommand"

# issues project: allow only read-only subcommands (list, view).
# Audited 2026-03-24: subcommands are list, view (read-only), create, update (state-mutating).
# No delete or archive subcommands exist. Auto-approving create/update would be unsafe.
[[allow]]
tool = "Bash"
command_regex = "^issues project (list|view)( |$)"
reason = "issues project read-only subcommand"

[[allow]]
tool = "Bash"
command_regex = "^(cd|command|false|hash|printf|pushd|popd|read|set|shift|source|true|type|umask|unset)( |$)"
reason = "Shell builtin"

# Read/search rules use ".*" to allow all paths (unanchored wildcard — intentionally unrestricted).
# To scope reads to a specific directory, replace ".*" with an anchored prefix, e.g.:
#   ^/home/user/project/    allows reads only under that directory
[[allow]]
tool = "Read"
file_path_regex = ".*"  # unanchored wildcard — matches every path; intentionally unrestricted
reason = "Read file"

[[allow]]
tool = "Grep"
file_path_regex = ".*"  # unanchored wildcard — matches every path; intentionally unrestricted
reason = "Search files"

[[allow]]
tool = "Glob"
file_path_regex = ".*"  # unanchored wildcard — matches every path; intentionally unrestricted
reason = "Search files"

[[allow]]
tool = "Search"
file_path_regex = ".*"  # unanchored wildcard — matches every path; intentionally unrestricted
reason = "Search files"

[[allow]]
tool = "Edit"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|arb|md|txt|sh|css|html|xml|sql)$"  # anchored at end ($); matches source extensions anywhere in path
file_path_exclude_regex = "\\.(env|pem|key|secret)"  # unanchored exclude — blocks secret extensions even without $ anchor
reason = "Edit source file"

[[allow]]
tool = "Write"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|arb|md|txt|sh|css|html|xml|sql)$"  # anchored at end ($); matches source extensions anywhere in path
file_path_exclude_regex = "\\.(env|pem|key|secret)"  # unanchored exclude — blocks secret extensions even without $ anchor
reason = "Write source file"

[[allow]]
tool = "Bash"
command_regex = "^\\./scripts/"
reason = "Project script"

# ──────────────────────────────────────────────
# Ask rules (prompt user for confirmation)
# ──────────────────────────────────────────────

[[ask]]
tool = "Edit"
file_path_regex = "\\.(lock|sum)$"  # anchored at end ($); prompts on lock/checksum extensions anywhere in path
reason = "Lock/checksum file"

# ──────────────────────────────────────────────
# Log rules (audit only, don't affect decisions)
# ──────────────────────────────────────────────

[[log]]
tool = "Bash"
command_regex = ".*"
reason = "Audit"
