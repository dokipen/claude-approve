# Claude Code Approval Hook Configuration
# Place at ~/.claude/hooks-config.toml

[audit]
audit_file = "/tmp/claude-tool-audit.jsonl"
audit_level = "matched"  # off | matched | all

# ──────────────────────────────────────────────
# Deny rules (evaluated first, highest priority)
# ──────────────────────────────────────────────

[[deny]]
tool = "Bash"
command_regex = "^rm\\b.*(-rf|-fr)"
reason = "Blocked rm -rf"

[[deny]]
tool = "Bash"
command_regex = "^(sudo|chmod|chown) "
reason = "Blocked sudo/chmod/chown"

[[deny]]
tool = "Write"
file_path_regex = "\\.(env|pem|key|secret)$"
reason = "Blocked writing secrets (.env/.pem/.key)"

# ──────────────────────────────────────────────
# Allow rules (auto-approve matching tool calls)
#
# Compound commands (&&, ||, ;, |) and bash -c are
# split by the shell AST parser. Each sub-command is
# evaluated independently. Most restrictive wins:
#   deny > ask > passthrough > allow
# ──────────────────────────────────────────────

[[allow]]
tool = "Bash"
command_regex = "^(bash|cargo|cat|cp|curl|diff|du|echo|env|export|file|find|grep|head|kill|killall|ls|lsof|make|mkdir|mv|nc|npm|npx|open|pgrep|pkill|pwd|pytest|sort|tail|tee|test|touch|tree|unzip|wc|which|yq)( |$)"
reason = "Simple command"

[[allow]]
tool = "Bash"
command_regex = "^(dart|flutter|gh|git|go|python3|ruby|sbt) [-a-z]"
reason = "Dev tool"

[[allow]]
tool = "Bash"
command_regex = "^(cd|command|false|hash|printf|pushd|popd|read|set|shift|source|true|type|umask|unset)( |$)"
reason = "Shell builtin"

[[allow]]
tool = "Read"
file_path_regex = ".*"
reason = "Read file"

[[allow]]
tool = "Edit"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|arb|md|txt|sh|css|html|xml|sql)$"
file_path_exclude_regex = "\\.(env|pem|key|secret)"
reason = "Edit source file"

[[allow]]
tool = "Write"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|arb|md|txt|sh|css|html|xml|sql)$"
file_path_exclude_regex = "\\.(env|pem|key|secret)"
reason = "Write source file"

[[allow]]
tool = "Bash"
command_regex = "^\\./scripts/"
reason = "Project script"

# ──────────────────────────────────────────────
# Ask rules (prompt user for confirmation)
# ──────────────────────────────────────────────

[[ask]]
tool = "Edit"
file_path_regex = "\\.(lock|sum)$"
reason = "Lock/checksum file"

# ──────────────────────────────────────────────
# Log rules (audit only, don't affect decisions)
# ──────────────────────────────────────────────

[[log]]
tool = "Bash"
command_regex = ".*"
reason = "Audit"
