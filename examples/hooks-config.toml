# Claude Code Approval Hook Configuration
# Place at ~/.claude/hooks-config.toml

[audit]
audit_file = "/tmp/claude-tool-audit.jsonl"
audit_level = "matched"  # off | matched | all

# ──────────────────────────────────────────────
# Deny rules (evaluated first, highest priority)
# ──────────────────────────────────────────────

[[deny]]
tool = "Bash"
command_regex = "^rm .*-rf"
reason = "Dangerous recursive force delete"

[[deny]]
tool = "Bash"
command_regex = "^(sudo|chmod|chown) "
reason = "Privileged commands need manual review"

[[deny]]
tool = "Write"
file_path_regex = "\\.(env|pem|key|secret)$"
reason = "Don't write secret/credential files"

# ──────────────────────────────────────────────
# Allow rules (auto-approve matching tool calls)
#
# Compound commands (&&, ||, ;, |) are automatically
# split and each sub-command is evaluated independently.
# The most restrictive decision wins:
#   deny > ask > passthrough > allow
#
# This means command_exclude_regex patterns for "&&"
# or ";" are no longer needed — you can simply list
# which commands are allowed and deny rules will still
# catch dangerous sub-commands.
# ──────────────────────────────────────────────

[[allow]]
tool = "Bash"
command_regex = "^(git|flutter|dart|go|npm|npx|cargo|make|pytest|echo|ls|cat|head|tail|wc|which|pwd|env|export|mkdir|cp|mv|touch|diff) "
reason = "Standard dev commands"

[[allow]]
tool = "Bash"
command_regex = "^(git|flutter|dart|go) [a-z]"
reason = "Simple dev tool invocations"

[[allow]]
tool = "Read"
file_path_regex = ".*"
reason = "Allow all file reads"

[[allow]]
tool = "Edit"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|md|txt|sh|css|html|sql)$"
file_path_exclude_regex = "\\.(env|pem|key|secret)"
reason = "Edit source code files"

[[allow]]
tool = "Write"
file_path_regex = "\\.(go|dart|ts|js|py|rs|toml|yaml|yml|json|md|txt|sh|css|html|sql)$"
file_path_exclude_regex = "\\.(env|pem|key|secret)"
reason = "Write source code files"

# ──────────────────────────────────────────────
# Ask rules (prompt user for confirmation)
# ──────────────────────────────────────────────

[[ask]]
tool = "Edit"
file_path_regex = "\\.(lock|sum)$"
reason = "Editing lock/checksum files needs confirmation"

# Note: compound commands are now analyzed per sub-command,
# so a blanket "ask on &&" rule is no longer needed.

# ──────────────────────────────────────────────
# Log rules (audit only, don't affect decisions)
# ──────────────────────────────────────────────

[[log]]
tool = "Bash"
command_regex = ".*"
reason = "Audit all bash commands"
